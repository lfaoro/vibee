<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>vibee.sh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-elevated: #141414;
            --fg: #ffffff;
            --fg-secondary: #888888;
            --dim: #777777;
            --muted: #555555;
            --border: #2a2a2a;
            --orange: #FF8C00;
            --max-width: 420px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            max-width: var(--max-width);
            width: 100%;
        }
        .card .icon {
            font-size: 56px;
            margin-bottom: 20px;
            line-height: 1;
        }
        .card h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--fg);
        }
        .card p {
            font-size: 14px;
            color: var(--fg-secondary);
            line-height: 1.7;
            margin-bottom: 28px;
        }
        .card code {
            color: var(--fg-secondary);
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: 13px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.15rem 0.35rem;
        }
        .card .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            background: #ffffff;
            color: #0a0a0a;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: opacity .2s;
        }
        .card .btn:hover {
            opacity: .85;
        }
        .socials {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .social-dot {
            color: var(--muted);
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            min-height: 44px;
        }
        .social-dot:hover {
            color: var(--fg);
        }
        .social-dot svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        @media (max-width: 640px) {
            .card {
                padding: 32px 20px;
            }
            .card .icon {
                font-size: 48px;
            }
            .card h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
